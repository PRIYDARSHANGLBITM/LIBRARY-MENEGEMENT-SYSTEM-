<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issue Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{

    background:#f4f7fb;

}

.page{

    margin-top:110px;
    margin-bottom:60px;

}

.form-card{

    max-width:650px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);

}

.page-title{

    text-align:center;
    color:#2563EB;
    font-weight:700;
    margin-bottom:30px;

}

.form-card label{

    font-weight:600;
    color:#444;
    margin-bottom:8px;

}

.form-card input,
.form-card select{

    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #dcdcdc;
    margin-bottom:18px;

}

.form-card input:focus,
.form-card select:focus{

    border-color:#2563EB;
    outline:none;
    box-shadow:0 0 8px rgba(37,99,235,.2);

}

.btn-main{

    background:#2563EB;
    color:white;
    border:none;
    padding:12px 35px;
    border-radius:10px;
    font-weight:600;

}

.btn-main:hover{

    background:#1D4ED8;
    color:white;

}

.bottom-link{

    text-align:center;
    margin-top:25px;

}

.bottom-link a{

    text-decoration:none;
    font-weight:600;

}

</style>

</head>

<body>

{% include "library/navbaradmin.html" %}

<div class="container page">

<div class="form-card">

<h2 class="page-title">

<i class="fa-solid fa-handshake"></i>

Issue Book To Student

</h2>

<form method="post">

{% csrf_token %}

{% for field in form %}

<div class="mb-3">

<label>

{{ field.label }}

</label>

{{ field }}

{% if field.errors %}

<div class="text-danger">

{{ field.errors }}

</div>

{% endif %}

</div>

{% endfor %}

<div class="text-center mt-4">

<button type="submit" class="btn btn-main">

<i class="fa-solid fa-paper-plane"></i>

Issue Book

</button>

</div>

</form>

<div class="bottom-link">

<a href="/viewissuedbook">

<i class="fa-solid fa-book-open"></i>

View Issued Books

</a>

</div>

</div>

</div>

{% include "library/footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
