<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    background:#f4f7fb;
}

.page{
    margin-top:110px;
    margin-bottom:60px;
}

.form-card{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.page-title{
    color:#2563EB;
    font-weight:700;
}

.form-label{
    font-weight:600;
    color:#444;
}

.form-control{
    border-radius:10px;
    padding:12px;
}

.form-control:focus{
    border-color:#2563EB;
    box-shadow:0 0 0 .2rem rgba(37,99,235,.15);
}

.btn-update{
    background:#2563EB;
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:10px;
    font-weight:600;
}

.btn-update:hover{
    background:#1D4ED8;
    color:white;
}

.btn-cancel{
    padding:10px 25px;
    border-radius:10px;
    font-weight:600;
}

</style>

</head>

<body>

{% include "library/navbaradmin.html" %}

<div class="container page">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="form-card">

<h2 class="page-title mb-4">

<i class="fa-solid fa-user-pen"></i>

Edit Student

</h2>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

First Name

</label>

<input
type="text"
class="form-control"
name="firstname"
value="{{ user.first_name }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Last Name

</label>

<input
type="text"
class="form-control"
name="lastname"
value="{{ user.last_name }}"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
class="form-control"
name="username"
value="{{ user.username }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
name="password"
placeholder="Leave blank to keep current password">

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Enrollment

</label>

<input
type="text"
class="form-control"
name="enrollment"
value="{{ student.enrollment }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Branch

</label>

<input
type="text"
class="form-control"
name="branch"
value="{{ student.branch }}"
required>

</div>

</div>

<div class="mt-4 d-flex gap-2">

<button type="submit" class="btn btn-update">

<i class="fa-solid fa-floppy-disk"></i>

Update Student

</button>

<a href="/viewstudent" class="btn btn-secondary btn-cancel">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

</div>

</form>

</div>

</div>

</div>

</div>

{% include "library/footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
