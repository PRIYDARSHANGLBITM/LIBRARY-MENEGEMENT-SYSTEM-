<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    background:#f4f7fb;
}

.hero{
    margin-top:120px;
    margin-bottom:80px;
}

.hero-card{

    background:linear-gradient(135deg,#14B8A6,#2563EB);
    color:white;
    padding:60px 40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.hero-card i{

    font-size:70px;
    margin-bottom:20px;

}

.hero-card h1{

    font-weight:700;
    margin-bottom:20px;

}

.hero-card p{

    font-size:18px;

}

.action-btn{

    min-width:180px;
    margin:10px;
    border-radius:12px;

}

</style>

</head>

<body>

{% include "library/navbar.html" %}

<div class="container hero">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="hero-card">

<i class="fa-solid fa-user-graduate"></i>

<h1>Student Panel</h1>

<p class="mb-4">
Welcome to the Library Management System.
Create your student account or login to view your issued books, due dates and library information.
</p>

<a href="studentsignup" class="btn btn-light btn-lg action-btn">
<i class="fa-solid fa-user-plus"></i>
 Sign Up
</a>

<a href="studentlogin" class="btn btn-warning btn-lg action-btn">
<i class="fa-solid fa-right-to-bracket"></i>
 Login
</a>

</div>

</div>

</div>

</div>

{% include "library/footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
