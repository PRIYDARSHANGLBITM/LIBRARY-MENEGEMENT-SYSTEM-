<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Book Issued</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    background:#f4f7fb;
}

.success-section{
    margin-top:120px;
    margin-bottom:80px;
}

.success-card{
    background:white;
    border-radius:20px;
    padding:50px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.success-icon{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:#198754;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
    margin-bottom:25px;
}

.btn-action{
    min-width:220px;
    margin:10px;
    border-radius:10px;
}

</style>

</head>

<body>

{% include "library/navbaradmin.html" %}

<div class="container success-section">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="success-card">

<div class="success-icon">
<i class="fa-solid fa-book-open-reader"></i>
</div>

<h2 class="fw-bold text-success">
Book Issued Successfully
</h2>

<p class="text-muted mb-4">
The selected book has been successfully issued to the student.
</p>

<a href="issuebook" class="btn btn-main btn-lg btn-action">
<i class="fa-solid fa-plus"></i>
 Issue Another Book
</a>

<a href="viewissuedbook" class="btn btn-outline-primary btn-lg btn-action">
<i class="fa-solid fa-list"></i>
 View Issued Books
</a>

</div>

</div>

</div>

</div>

{% include "library/footer.html" %}
